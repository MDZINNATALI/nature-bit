{% extends "base.html" %}

{% block title %}নতুন গাছ যোগ করুন - এডমিন{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    
    h1 {
        color: #2e7d32;
        margin-bottom: 30px;
        text-align: center;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
    }
    
    input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
    }
    
    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #4caf50;
    }
    
    textarea {
        height: 100px;
        resize: vertical;
    }
    
    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }
    
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .checkbox-group input {
        width: auto;
    }
    
    .btn-submit {
        width: 100%;
        padding: 15px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
        margin-top: 20px;
    }
    
    .btn-submit:hover {
        background: #2e7d32;
    }
    
    .btn-cancel {
        display: inline-block;
        margin-top: 15px;
        padding: 12px 20px;
        background: #6c757d;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        text-align: center;
        width: 100%;
    }
    
    .btn-cancel:hover {
        background: #5a6268;
    }
    
    .help-text {
        font-size: 0.85rem;
        color: #999;
        margin-top: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1>➕ নতুন গাছ যোগ করুন</h1>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>গাছের নাম *</label>
            <input type="text" name="name" required placeholder="যেমন: মনি প্ল্যান্ট">
        </div>
        
        <div class="form-group">
            <label>বৈজ্ঞানিক নাম (ঐচ্ছিক)</label>
            <input type="text" name="scientific_name" placeholder="যেমন: Epipremnum aureum">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>ক্যাটাগরি *</label>
                <select name="category" required>
                    <option value="">সিলেক্ট করুন</option>
                    <option value="ইনডোর">ইনডোর</option>
                    <option value="আউটডোর">আউটডোর</option>
                    <option value="ফুল">ফুল</option>
                    <option value="ফল">ফল</option>
                    <option value="ঔষধি">ঔষধি</option>
                    <option value="সুকুলেন্ট">সুকুলেন্ট</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>মূল্য (৳) *</label>
                <input type="number" name="price" step="0.01" min="0" required placeholder="যেমন: 350">
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>পুরনো মূল্য (ঐচ্ছিক)</label>
                <input type="number" name="old_price" step="0.01" min="0" placeholder="যেমন: 450">
            </div>
            
            <div class="form-group">
                <label>স্টক পরিমাণ *</label>
                <input type="number" name="stock" min="0" required placeholder="যেমন: 10">
            </div>
        </div>
        
        <div class="form-group">
            <label>বিবরণ *</label>
            <textarea name="description" required placeholder="গাছ সম্পর্কে বিস্তারিত লিখুন"></textarea>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>আলোর প্রয়োজনীয়তা</label>
                <input type="text" name="light_requirement" placeholder="যেমন: পূর্ণ সূর্য, আংশিক ছায়া">
            </div>
            
            <div class="form-group">
                <label>পানির প্রয়োজনীয়তা</label>
                <input type="text" name="water_requirement" placeholder="যেমন: মাঝারি, কম">
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>উচ্চতা</label>
                <input type="text" name="height" placeholder="যেমন: ২-৩ ফুট">
            </div>
            
            <div class="form-group">
                <label>টবের সাইজ</label>
                <input type="text" name="pot_size" placeholder="যেমন: ৬ ইঞ্চি">
            </div>
        </div>
        
        <div class="form-group">
            <label>ফুল ফোটার সময়</label>
            <input type="text" name="blooming_season" placeholder="যেমন: বসন্ত-শরৎ">
        </div>
        
        <div class="form-group">
            <label>ছবি</label>
            <input type="file" name="image" accept="image/*">
            <div class="help-text">JPG, PNG, GIF ফাইল (সর্বোচ্চ ৫এমবি)</div>
        </div>
        
        <div class="form-group checkbox-group">
            <input type="checkbox" name="featured" id="featured">
            <label for="featured">হোম পেজে ফিচার্ড হিসেবে দেখান</label>
        </div>
        
        <button type="submit" class="btn-submit">✅ গাছ যোগ করুন</button>
    </form>
    
    <a href="/admin/plants" class="btn-cancel">← বাতিল করুন</a>
</div>
{% endblock %}
